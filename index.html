<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Live2D Test</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      color: #fff;
      font-family: sans-serif;
    }

    #status {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 10;
      padding: 8px 12px;
      background: rgba(0,0,0,0.75);
      border: 1px solid #666;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      max-width: 90vw;
    }

    #live2d-canvas {
      width: 100vw;
      height: 100vh;
      display: block;
      outline: 1px solid #555;
    }
  </style>
</head>

<body>
  <div id="status">正在準備 Live2D...</div>
  <canvas id="live2d-canvas"></canvas>

  <!-- 載入順序不要換 -->
  <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/index.min.js"></script>

  <script>
    const statusBox = document.getElementById("status");

    function setStatus(text) {
      statusBox.textContent = text;
      console.log(text);
    }

    window.onerror = function(message, source, lineno, colno, error) {
      setStatus(
        "JavaScript 錯誤：\n" +
        message + "\n\n" +
        "位置：" + source + ":" + lineno + ":" + colno
      );
    };

    const modelPath = "./model/shinomiya.model3.json";

    let app;
    let model;

    async function initLive2D() {
      try {
        setStatus("正在檢查 Live2D 函式庫...");

        if (!window.PIXI) {
          throw new Error("PIXI 沒有載入成功。");
        }

        if (!PIXI.live2d || !PIXI.live2d.Live2DModel) {
          throw new Error(
            "pixi-live2d-display 沒有正確載入。\n\n" +
            "目前 PIXI 有載入，但 PIXI.live2d.Live2DModel 不存在。\n" +
            "請確認 pixi-live2d-display 的 script 是否使用 @0.4.0 固定版本。"
          );
        }

        setStatus("函式庫載入成功，正在建立畫布...");

        app = new PIXI.Application({
          view: document.getElementById("live2d-canvas"),
          resizeTo: window,
          backgroundAlpha: 0,
          autoStart: true
        });

        setStatus("正在載入模型：\n" + modelPath);

        model = await PIXI.live2d.Live2DModel.from(modelPath);

        setStatus("模型載入成功，正在顯示...");

        app.stage.addChild(model);

        model.anchor.set(0.5, 0.5);

        // 位置：先放在畫面中央，避免角色跑到畫面外
        model.x = window.innerWidth / 2;
        model.y = window.innerHeight / 2;

        // 大小：太小看不到就改 0.6 / 0.8，太大就改 0.2
        model.scale.set(0.4);

        setStatus("Live2D 顯示完成！");

      } catch (error) {
        setStatus(
          "載入失敗：\n\n" +
          error.message + "\n\n" +
          "目前模型路徑：\n" +
          modelPath + "\n\n" +
          "請檢查：\n" +
          "1. CDN 是否固定為 pixi-live2d-display@0.4.0\n" +
          "2. model/shinomiya.model3.json 是否能直接用網址打開\n" +
          "3. shinomiya.moc3 是否有上傳\n" +
          "4. textures/texture_00.png 是否有上傳\n" +
          "5. model3.json 內部引用路徑是否正確"
        );

        console.error(error);
      }
    }

    window.addEventListener("resize", () => {
      if (!model) return;

      model.x = window.innerWidth / 2;
      model.y = window.innerHeight / 2;
    });

    initLive2D();
  </script>
</body>
</html>
